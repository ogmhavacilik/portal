<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hava Araçları Bakım Teknik Şube Müdürlüğü</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0b3d1d; /* Orman Yeşili */
            overflow: hidden;
        }

        /* Splash Screen Animasyonu */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        /* Ana Portal Fade-in */
        #main-portal {
            opacity: 0;
            transition: opacity 1s ease-in-out;
            display: none;
            height: 100vh;
            overflow-y: auto;
        }

        /* Modal Animasyon */
        #system-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 500;
            display: none;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #system-modal.active {
            display: flex;
            transform: translateY(0);
        }

        /* Cam Efekti Kartlar */
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        /* Iframe Yüklenme Animasyonu */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #0b3d1d;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Başlık Gölgesi */
        .text-shadow {
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .logo-header {
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.2));
        }

        .status-badge {
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 99px;
            margin-top: 8px;
            color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

    <!-- AÇILIŞ EKRANI (SPLASH) -->
    <div id="splash-screen">
        <div class="relative flex items-center justify-center">
            <!-- Logo Yuvarlak, %50 Büyük -->
            <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2k5Z3lsMWRoaDE3NTNmb2w4M3d3cWljYW16NDRwNmZlbGtxN2lwdCZlcD12MV9pbnRlcmcmY3Q9Zw/n7frjzkahqcqyik0o3/giphy.gif" 
                 alt="Logo" 
                 class="w-[450px] h-[450px] md:w-[600px] md:h-[600px] rounded-full object-cover shadow-2xl border-4 border-[#0b3d1d]/10">
        </div>
        <p class="mt-12 text-[#0b3d1d] font-bold text-xl tracking-[0.4em] uppercase animate-pulse">Sistem Hazırlanıyor</p>
    </div>

    <!-- ANA PORTAL EKRANI -->
    <div id="main-portal" class="flex flex-col items-center">
        <div class="container mx-auto px-4 py-16 flex flex-col items-center min-h-screen">
            
            <!-- Başlık Alanı (Logolar Yanında) -->
            <header class="text-center mb-20 md:mb-32 w-full">
                <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-10">
                    <!-- Sol Logo -->
                    <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2k5Z3lsMWRoaDE3NTNmb2w4M3d3cWljYW16NDRwNmZlbGtxN2lwdCZlcD12MV9pbnRlcmcmY3Q9Zw/n7frjzkahqcqyik0o3/giphy.gif" 
                         alt="Logo Sol" class="w-16 h-16 md:w-24 md:h-24 object-cover rounded-full logo-header">
                    
                    <h1 class="text-3xl md:text-5xl font-extrabold text-white text-shadow tracking-tight uppercase leading-tight">
                        HAVA ARAÇLARI BAKIM <br class="hidden md:block"> TEKNİK ŞUBE MÜDÜRLÜĞÜ
                    </h1>

                    <!-- Sağ Logo -->
                    <img src="https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExb2k5Z3lsMWRoaDE3NTNmb2w4M3d3cWljYW16NDRwNmZlbGtxN2lwdCZlcD12MV9pbnRlcmcmY3Q9Zw/n7frjzkahqcqyik0o3/giphy.gif" 
                         alt="Logo Sağ" class="w-16 h-16 md:w-24 md:h-24 object-cover rounded-full logo-header">
                </div>
                <div class="h-1.5 w-48 bg-gradient-to-r from-transparent via-white/40 to-transparent mx-auto mt-10 rounded-full"></div>
            </header>

            <!-- İkon Kartları -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-7xl px-4">
                
                <!-- HAVA ARAÇLARI DURUM (YENİ) -->
                <button onclick="openSystem('https://filodurumlar-bakimsube.netlify.app/', 'HAVA ARAÇLARI DURUM')" 
                        class="glass-card flex flex-col items-center p-8 rounded-3xl group">
                    <div class="bg-white/10 p-5 rounded-2xl group-hover:bg-white/20 transition-all mb-4">
                        <i data-lucide="plane-takeoff" class="w-10 h-10 text-white"></i>
                    </div>
                    <span class="text-white font-bold text-lg tracking-wider text-center">HAVA ARAÇLARI DURUM</span>
                </button>

                <!-- PERSONEL (ESKİ YOKLAMA) -->
                <button onclick="openSystem('https://bakimsube-yoklama.netlify.app/', 'PERSONEL')" 
                        class="glass-card flex flex-col items-center p-8 rounded-3xl group">
                    <div class="bg-white/10 p-5 rounded-2xl group-hover:bg-white/20 transition-all mb-4">
                        <i data-lucide="users" class="w-10 h-10 text-white"></i>
                    </div>
                    <span class="text-white font-bold text-lg tracking-wider">PERSONEL</span>
                </button>

                <!-- İKMAL (YENİ) -->
                <button onclick="openCategory('İKMAL')" 
                        class="glass-card flex flex-col items-center p-8 rounded-3xl group">
                    <div class="bg-white/10 p-5 rounded-2xl group-hover:bg-white/20 transition-all mb-4">
                        <i data-lucide="package" class="w-10 h-10 text-white"></i>
                    </div>
                    <span class="text-white font-bold text-lg tracking-wider">İKMAL</span>
                </button>

                <!-- BAKIM TAKİP (YENİ) -->
                <button onclick="openCategory('BAKIM TAKİP')" 
                        class="glass-card flex flex-col items-center p-8 rounded-3xl group">
                    <div class="bg-white/10 p-5 rounded-2xl group-hover:bg-white/20 transition-all mb-4">
                        <i data-lucide="settings" class="w-10 h-10 text-white"></i>
                    </div>
                    <span class="text-white font-bold text-lg tracking-wider">BAKIM TAKİP</span>
                </button>

            </div>

            <footer class="mt-auto py-12 text-white/30 text-[10px] tracking-[0.5em] uppercase font-mono text-center">
                © <span id="current-year"></span> Havacılık Teknik Portal | Kurumsal Erişim
            </footer>
        </div>
    </div>

    <!-- SİSTEM MODAL (IFRAME PENCERESİ) -->
    <div id="system-modal">
        <div class="h-16 bg-[#0b3d1d] flex items-center justify-between px-6 shadow-xl border-b border-white/10">
            <div class="flex items-center gap-4">
                <button onclick="closeSystem()" 
                        class="flex items-center gap-2 text-white bg-white/10 hover:bg-white/20 transition-all px-5 py-2 rounded-xl text-sm font-bold">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Ana Sayfaya Dön
                </button>
                <div class="h-8 w-px bg-white/20 hidden sm:block"></div>
                <h2 id="modal-title" class="text-white font-bold text-lg hidden sm:block uppercase tracking-widest">SİSTEM</h2>
            </div>
            <button onclick="closeSystem()" class="text-white/70 hover:text-white transition-all p-2 rounded-lg hover:bg-red-600/20">
                <i data-lucide="x" class="w-7 h-7"></i>
            </button>
        </div>

        <div class="flex-1 w-full bg-[#f8fafc] relative">
            <div id="iframe-loader" class="absolute inset-0 flex items-center justify-center bg-[#0b3d1d]/5">
                <div class="loader"></div>
            </div>
            <div id="design-phase-content" class="hidden absolute inset-0 flex items-center justify-center bg-white flex-col">
                <i data-lucide="construction" class="w-20 h-20 text-[#0b3d1d] mb-4"></i>
                <h3 class="text-2xl font-bold text-[#0b3d1d]">TASARIM AŞAMASINDA</h3>
                <p class="text-gray-500 mt-2">Bu modül üzerinde çalışmalar devam etmektedir.</p>
            </div>
            <div id="category-menu-content" class="hidden absolute inset-0 flex items-center justify-center bg-[#f8fafc] p-8 overflow-y-auto">
                <div id="category-buttons" class="grid grid-cols-1 sm:grid-cols-2 gap-8 w-full max-w-4xl">
                    <!-- Dinamik Butonlar -->
                </div>
            </div>
            <iframe id="system-iframe" src="" class="w-full h-full border-none" onload="document.getElementById('iframe-loader').style.display='none'"></iframe>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Dinamik Yılı Güncelle
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // 5 Saniye Sonra Splash Kapat
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                const portal = document.getElementById('main-portal');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    portal.style.display = 'block';
                    setTimeout(() => { portal.style.opacity = '1'; }, 50);
                }, 1000);
            }, 5000);
        });

        function showDesignPhase(title) {
            const modal = document.getElementById('system-modal');
            const iframe = document.getElementById('system-iframe');
            const modalTitle = document.getElementById('modal-title');
            const loader = document.getElementById('iframe-loader');
            const designMsg = document.getElementById('design-phase-content');
            const categoryMenu = document.getElementById('category-menu-content');

            modalTitle.innerText = title || "TASARIM AŞAMASINDA";
            loader.style.display = 'none';
            iframe.style.display = 'none';
            categoryMenu.style.display = 'none';
            designMsg.style.display = 'flex';
            
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
        }

        function openCategory(category) {
            const modal = document.getElementById('system-modal');
            const iframe = document.getElementById('system-iframe');
            const modalTitle = document.getElementById('modal-title');
            const loader = document.getElementById('iframe-loader');
            const designMsg = document.getElementById('design-phase-content');
            const categoryMenu = document.getElementById('category-menu-content');
            const categoryButtons = document.getElementById('category-buttons');

            modalTitle.innerText = category.toUpperCase();
            loader.style.display = 'none';
            iframe.style.display = 'none';
            designMsg.style.display = 'none';
            categoryMenu.style.display = 'flex';
            
            categoryButtons.innerHTML = ''; 

            if (category === 'İKMAL') {
                addCategoryButton('İŞ TAKİP', 'clipboard-list', () => openSystem('https://ogmbakimsube-taskline.netlify.app/', 'İŞ TAKİP'));
                addCategoryButton('YAKIT', 'fuel', () => window.open('https://ogmhavacilik-takipsistem.netlify.app/', '_blank'));
            } else if (category === 'BAKIM TAKİP') {
                addCategoryButton('KALİBRASYONLU MALZEMELER LİSTESİ', 'wrench', () => showDesignPhase('KALİBRASYONLU MALZEMELER LİSTESİ'));
                addCategoryButton('PERİYODİK BAKIM TAKİP LİSTESİ', 'calendar-check', () => showDesignPhase('PERİYODİK BAKIM TAKİP LİSTESİ'));
            }

            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
        }

        function addCategoryButton(text, icon, onClick) {
            const btn = document.createElement('button');
            btn.className = 'glass-card flex flex-col items-center p-8 rounded-3xl group bg-white border-gray-200 shadow-sm hover:shadow-md';
            btn.onclick = onClick;
            btn.innerHTML = `
                <div class="bg-[#0b3d1d]/10 p-5 rounded-2xl group-hover:bg-[#0b3d1d]/20 transition-all mb-4">
                    <i data-lucide="${icon}" class="w-10 h-10 text-[#0b3d1d]"></i>
                </div>
                <span class="text-[#0b3d1d] font-bold text-lg tracking-wider text-center">${text}</span>
            `;
            document.getElementById('category-buttons').appendChild(btn);
            lucide.createIcons();
        }

        function openSystem(url, title) {
            const modal = document.getElementById('system-modal');
            const iframe = document.getElementById('system-iframe');
            const modalTitle = document.getElementById('modal-title');
            const loader = document.getElementById('iframe-loader');
            const designMsg = document.getElementById('design-phase-content');
            const categoryMenu = document.getElementById('category-menu-content');

            modalTitle.innerText = title;
            loader.style.display = 'flex';
            iframe.style.display = 'block';
            designMsg.style.display = 'none';
            categoryMenu.style.display = 'none';
            iframe.src = url;
            
            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('active');
            }, 10);
        }

        function closeSystem() {
            const modal = document.getElementById('system-modal');
            const iframe = document.getElementById('system-iframe');
            
            modal.classList.remove('active');
            setTimeout(() => {
                modal.style.display = 'none';
                iframe.src = '';
            }, 400);
        }
    </script>
</body>

</html>
